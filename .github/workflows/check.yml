name: check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md
          test -f CATALOG.md
          test -f FREE_PAID_BOUNDARY.md
          test -f ROADMAP.md
          test -f THREE_TIER_PRODUCT_DESIGN.md
          test -f CONTRIBUTING.md

      - name: Public boundary wording
        run: |
          grep -R "MIRAI Memory本体" README.md CATALOG.md FREE_PAID_BOUNDARY.md ROADMAP.md THREE_TIER_PRODUCT_DESIGN.md CONTRIBUTING.md
